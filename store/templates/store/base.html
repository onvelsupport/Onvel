{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONVEL</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: #f5f5f5;
      color: #000;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .logo a {
      display: inline-block;
    }

    .logo img {
      height: 50px;
      width: auto;
      display: block;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-right a,
    .nav-right span {
      text-decoration: none;
      color: black;
      font-size: 14px;
      line-height: 1.4;
      white-space: nowrap;
    }

    .nav-right a:hover,
    footer a:hover {
      opacity: 0.7;
    }

    main {
      flex: 1;
      width: 100%;
    }

    /* ===== UPDATED FOOTER ===== */
        footer {
      text-align: center;
      padding: 30px;
      font-size: 12px;
    }

    footer a {
      margin: 0 10px;
      text-decoration: none;
      color: black;
    }
    /* ========================== */

    .page-title {
      text-align: center;
      font-family: 'Times New Roman', serif;
      font-size: 44px;
      margin: 30px 0 90px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    @media (max-width: 768px) {
      header {
        padding: 18px 20px;
        flex-direction: column;
        align-items: center;
      }

      .logo img {
        height: 42px;
      }

      .nav-right {
        width: 100%;
        justify-content: center;
        gap: 14px 18px;
      }

      .nav-right a,
      .nav-right span {
        font-size: 13px;
      }

      .page-title {
        font-size: 30px;
        margin: 20px 0 50px;
      }

      footer {
        padding: 30px 16px;
      }

      .footer-links {
        flex-direction: column;
        gap: 10px;
      }
    }

    @media (max-width: 480px) {
      header {
        padding: 16px;
      }

      .logo img {
        height: 38px;
      }

      .nav-right {
        gap: 10px 16px;
      }

      .nav-right a,
      .nav-right span {
        font-size: 12px;
        white-space: normal;
      }

      .page-title {
        font-size: 24px;
        margin: 16px 0 35px;
      }

      footer {
        font-size: 11px;
      }
    }
  </style>

  {% block extra_css %}{% endblock %}
</head>

<body>

<header>
  <div class="logo">
    <a href="{% url 'home' %}">
      <img src="{% static 'store/images/logo.png' %}" alt="ONVEL Logo">
    </a>
  </div>

  <div class="nav-right">
    <a href="{% url 'home' %}">SHOP</a>
    <a href="{% url 'terms' %}">TERMS & CONDITIONS</a>
    <a href="{% url 'contact' %}">CONTACT</a>
    <a href="{% url 'cart' %}">CART ({{ cart_count }})</a>
  </div>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  <a href="{% url 'refund' %}">REFUND POLICY</a>
  <a href="{% url 'privacy' %}">PRIVACY POLICY</a>
  <a href="{% url 'terms' %}">TERMS OF SERVICE</a>
  <a href="{% url 'contact' %}">CONTACT INFORMATION</a>
  <p>© 2026, ONVEL</p>
</footer>


</body>
</html>
